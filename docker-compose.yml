services:
  # Fix volume permissions on first run (volumes created as root)
  init:
    image: busybox
    user: root
    volumes:
      - claude-auth:/home/claude/.claude
      - meridian-config:/home/claude/.config
    entrypoint: ["sh", "-c", "chown -R 1000:1000 /home/claude/.claude /home/claude/.config"]
    restart: "no"

  proxy:
    build: .
    image: meridian
    user: "claude"
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "3456:3456"
    volumes:
      - claude-auth:/home/claude/.claude
      # Persist global settings (native toggles, sdk-features) across recreate so
      # UI/CLI toggle changes survive restarts.
      - meridian-config:/home/claude/.config
    restart: unless-stopped

volumes:
  claude-auth:
  meridian-config:
