services:
  # Fix volume permissions on first run (volumes created as root)
  init:
    image: busybox
    user: root
    volumes:
      - claude-auth:/home/claude/.claude
      - meridian-config:/home/claude/.config
    entrypoint: ["sh", "-c", "chown -R 1000:1000 /home/claude/.claude /home/claude/.config"]
    restart: "no"

  proxy:
    build: .
    image: meridian
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "3456:3456"
    volumes:
      - claude-auth:/home/claude/.claude
      - meridian-config:/home/claude/.config
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "1"

  docker-prune:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["sh", "-c", "while true; do sleep 86400; docker system prune -af --filter until=24h; docker builder prune -af; done"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

volumes:
  claude-auth:
  meridian-config:
